name: Keepalive

on:
  schedule:
    - cron: '0 9 1 * *'  # 1st of every month at 09:00 UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Commit keepalive marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p .github
          echo "Last keepalive: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > .github/keepalive
          git add .github/keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive [skip ci]"
          git push
